<h1>{{portalName}}</h1>
<p>
    Manage your courses,view your profile and track your academic progress
</p>
<div class="stats">
    <div>
        <h3>Courses Available</h3>
        <p>{{availableCourses}}</p>
    </div>
    <div>
        <h3>Enrolled</h3>
        <p>3</p>
    </div>
    <div>
        <h3>GPA</h3>
        <p>3.8</p>
    </div>
</div>
<button [disabled]="!isPortalActive"
(click)="onEnrollClick()">
    Enroll Now
</button>
<p>{{message}}</p>
<br><br>
<input type="text" placeholder="Search courses"
[(ngModel)]="searchTerm">
<p>
    Searching for:
    {{searchTerm}}
</p>
