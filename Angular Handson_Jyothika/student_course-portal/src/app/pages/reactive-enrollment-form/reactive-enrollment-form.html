<section class="enrollment">
  <h1>Reactive Enrollment Request</h1>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
    <label>
      <span>Student Name</span>
      <input formControlName="studentName" />
      <small *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']">Name is required</small>
      <small *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']">Name must be at least 3 characters</small>
    </label>

    <label>
      <span>Student Email</span>
      <input formControlName="studentEmail" type="email" />
      <small *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['required']">Email is required</small>
      <small *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']">Enter a valid email address</small>
      <small *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['emailTaken']">Email taken</small>
    </label>

    <label>
      <span>Course ID</span>
      <input formControlName="courseId" />
      <small *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">Course code starting with XX is not allowed.</small>
    </label>

    <label>
      <span>Preferred Semester</span>
      <select formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </label>

    <label class="checkbox">
      <input type="checkbox" formControlName="agreeToTerms" />
      <span>I agree to the terms</span>
    </label>

    <div formArrayName="additionalCourses" class="array">
      <div *ngFor="let ctrl of additionalCourses.controls; let i = index" class="array-row">
        <input [formControl]="ctrl" placeholder="Additional course" />
        <button type="button" class="secondary" (click)="removeCourse(i)">Remove</button>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="secondary" (click)="addCourse()">Add Another Course</button>
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    </div>
  </form>

  <div class="success" *ngIf="submitted && enrollForm.valid">Enrollment request submitted successfully!</div>
</section>
